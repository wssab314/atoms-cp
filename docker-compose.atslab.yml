x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-env: &app-env
  NODE_ENV: production
  DATA_STORE: postgres
  AUTH_MODE: local
  LOCAL_AUTH_REGISTRATION_ENABLED: ${LOCAL_AUTH_REGISTRATION_ENABLED:-false}
  AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?AUTH_SESSION_SECRET is required}
  AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-7}
  DATABASE_URL: postgres://atoms_cp:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/atoms_cp
  DATABASE_SCHEMA: ${DATABASE_SCHEMA:-atoms_cp}
  REDIS_URL: redis://redis:6379
  REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-atoms_cp:}
  PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-https://atslab.top}
  PUBLIC_API_ORIGIN: ${PUBLIC_API_ORIGIN:-https://atslab.top}
  ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-https://atslab.top}
  PREVIEW_BASE_URL: ${PREVIEW_BASE_URL:-https://atslab.top/preview}
  PREVIEW_ROOT_DIR: /var/lib/atoms-cp/previews
  PREVIEW_ACCESS_SECRET: ${PREVIEW_ACCESS_SECRET:?PREVIEW_ACCESS_SECRET is required}
  PREVIEW_BUILD_MODE: ${PREVIEW_BUILD_MODE:-fast}
  PREVIEW_TEMPLATE_ROOT: ${PREVIEW_TEMPLATE_ROOT:-/app/packages/generated-app-template}
  TARO_PREVIEW_TEMPLATE_ROOT: ${TARO_PREVIEW_TEMPLATE_ROOT:-/app/packages/generated-taro-template}
  CODEX_WORKSPACE_ROOT: /var/lib/atoms-cp/workspaces
  BUILD_WORKSPACE_ROOT: /var/lib/atoms-cp/build-workspaces
  WORKSPACE_RETENTION_DAYS: ${WORKSPACE_RETENTION_DAYS:-7}
  PREVIEW_RETENTION_DAYS: ${PREVIEW_RETENTION_DAYS:-14}
  BUILD_MAX_CONCURRENT: ${BUILD_MAX_CONCURRENT:-1}
  CODEX_TASK_STALE_MS: ${CODEX_TASK_STALE_MS:-900000}
  BUILD_JOB_STALE_MS: ${BUILD_JOB_STALE_MS:-900000}
  MODEL_PROVIDER: ${MODEL_PROVIDER:-volcengine}
  VOLCENGINE_API_KEY_FILE: /run/atoms-cp-secrets/volcengine_api_key
  VOLCENGINE_BASE_URL: ${VOLCENGINE_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
  VOLCENGINE_MODEL: ${VOLCENGINE_MODEL:-doubao-seed-2-1-turbo-260628}
  MODEL_REQUEST_TIMEOUT_MS: ${MODEL_REQUEST_TIMEOUT_MS:-60000}
  MODEL_BUDGET_CNY: ${MODEL_BUDGET_CNY:-25}
  ADMIN_BOOTSTRAP_EMAILS: ${ADMIN_BOOTSTRAP_EMAILS:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-https://atslab.top/api/connectors/github/oauth/callback}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  GITHUB_TOKEN_ENCRYPTION_KEY: ${GITHUB_TOKEN_ENCRYPTION_KEY:?GITHUB_TOKEN_ENCRYPTION_KEY is required}
  CONNECTOR_TOKEN_ENCRYPTION_KEY: ${CONNECTOR_TOKEN_ENCRYPTION_KEY:?CONNECTOR_TOKEN_ENCRYPTION_KEY is required}
  VERCEL_TOKEN: ${VERCEL_TOKEN:-}
  VERCEL_TEAM_ID: ${VERCEL_TEAM_ID:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  INTERNAL_BETA_SMOKE_MODE: ${INTERNAL_BETA_SMOKE_MODE:-deterministic}
  CODEX_WORKER_MODE: ${CODEX_WORKER_MODE:-container}
  CODEX_DOCKER_LOG_MAX_BYTES: ${CODEX_DOCKER_LOG_MAX_BYTES:-65536}
  CODEX_EXECUTION_IDLE_TIMEOUT_MS: ${CODEX_EXECUTION_IDLE_TIMEOUT_MS:-180000}
  CODEX_EXECUTION_HEARTBEAT_MS: ${CODEX_EXECUTION_HEARTBEAT_MS:-30000}
  CODEX_REAL_EXECUTION_ENABLED: ${CODEX_REAL_EXECUTION_ENABLED:-true}
  CODEX_REAL_COMMAND: ${CODEX_REAL_COMMAND:-/app/scripts/codex-doubao21-exec.sh}
  CODEX_DOCKER_NETWORK_MODE: ${CODEX_DOCKER_NETWORK_MODE:-none}
  CODEX_OUTPUT_MAX_FILES: ${CODEX_OUTPUT_MAX_FILES:-200}
  CODEX_OUTPUT_MAX_BYTES: ${CODEX_OUTPUT_MAX_BYTES:-5242880}
  CODEX_EXECUTION_ENV_ALLOWLIST: ${CODEX_EXECUTION_ENV_ALLOWLIST:-}
  CODEX_REAL_PREFLIGHT_ONLY: ${CODEX_REAL_PREFLIGHT_ONLY:-false}
  CODEX_REAL_CANARY_ENABLED: ${CODEX_REAL_CANARY_ENABLED:-false}
  CODEX_REAL_USER_TASKS_ENABLED: ${CODEX_REAL_USER_TASKS_ENABLED:-true}
  CODEX_REAL_USER_TASK_EMAIL_ALLOWLIST: ${CODEX_REAL_USER_TASK_EMAIL_ALLOWLIST:-test@atslab.top}
  CODEX_SECRET_FILE: /run/atoms-cp-secrets/volcengine_api_key
  CODEX_SECRET_MOUNT_PATH: /run/atoms-cp-secrets/volcengine_api_key
  CODEX_REAL_TASK_LIMIT_PER_RUN: ${CODEX_REAL_TASK_LIMIT_PER_RUN:-1}
  CODEX_REAL_DAILY_BUDGET_TASKS: ${CODEX_REAL_DAILY_BUDGET_TASKS:-3}
  CODEX_REAL_MAX_RUNTIME_MS: ${CODEX_REAL_MAX_RUNTIME_MS:-600000}
  CODEX_REAL_AUTO_DISABLE_ON_FAILURE: ${CODEX_REAL_AUTO_DISABLE_ON_FAILURE:-true}
  CODEX_DOUBAO_MODEL: ${CODEX_DOUBAO_MODEL:-doubao-seed-2-1-turbo-260628}
  CODEX_DOUBAO_BASE_URL: ${CODEX_DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}

x-app-volumes: &app-volumes
  - atoms-preview-data:/var/lib/atoms-cp/previews
  - atoms-workspace-data:/var/lib/atoms-cp/workspaces
  - atoms-build-data:/var/lib/atoms-cp/build-workspaces
  - ./secrets:/run/atoms-cp-secrets:ro

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.atslab:/etc/caddy/Caddyfile:ro
      - atoms-caddy-data:/data
      - atoms-caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
    networks:
      - atoms_public
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    cpus: "0.20"
    mem_limit: 128m

  web:
    image: ${ATOMS_APP_IMAGE:?ATOMS_APP_IMAGE is required}
    command: ["node", "scripts/serve-web-static.mjs"]
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WEB_STATIC_ROOT: /app/apps/web/dist
      WEB_STATIC_PORT: 8080
      WEB_API_PROXY_ORIGIN: http://api:4000
    expose:
      - "8080"
    networks:
      - atoms_public
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    cpus: "0.35"
    mem_limit: 160m

  api:
    image: ${ATOMS_APP_IMAGE:?ATOMS_APP_IMAGE is required}
    command: ["pnpm", "--filter", "@atoms-cp/api", "start"]
    init: true
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: 4000
    expose:
      - "4000"
    volumes: *app-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atoms_public
      - atoms_private
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    cpus: "0.80"
    mem_limit: 768m

  builder-worker:
    image: ${ATOMS_APP_IMAGE:?ATOMS_APP_IMAGE is required}
    command: ["pnpm", "--filter", "@atoms-cp/builder-worker", "start"]
    init: true
    restart: unless-stopped
    environment:
      <<: *app-env
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-5000}
    volumes: *app-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atoms_public
      - atoms_private
    logging: *default-logging
    cpus: "1.00"
    mem_limit: 1536m

  codex-worker:
    image: ${ATOMS_APP_IMAGE:?ATOMS_APP_IMAGE is required}
    command: ["pnpm", "--filter", "@atoms-cp/api", "start:codex-worker"]
    init: true
    restart: unless-stopped
    environment:
      <<: *app-env
      CODEX_WORKER_ID: ${CODEX_WORKER_ID:-codex-worker-atslab}
      CODEX_WORKER_INTERVAL_MS: ${CODEX_WORKER_INTERVAL_MS:-5000}
    volumes: *app-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atoms_public
      - atoms_private
    logging: *default-logging
    cpus: "0.80"
    mem_limit: 1024m

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atoms_cp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: atoms_cp
    volumes:
      - atoms-postgres-data:/var/lib/postgresql/data
    networks:
      - atoms_private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atoms_cp -d atoms_cp"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    cpus: "0.50"
    mem_limit: 768m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - atoms-redis-data:/data
    networks:
      - atoms_private
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    cpus: "0.20"
    mem_limit: 128m

volumes:
  atoms-caddy-data:
  atoms-caddy-config:
  atoms-postgres-data:
  atoms-redis-data:
  atoms-preview-data:
  atoms-workspace-data:
  atoms-build-data:

networks:
  atoms_public:
  atoms_private:
    internal: true
